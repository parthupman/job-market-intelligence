databases:
  - name: job-market-db
    plan: free
    ipAllowList: []

services:
    
  # 2. Streamlit Web Service
  - type: web
    name: job-market-dashboard
    env: docker
    plan: free
    branch: main
    repo: https://github.com/PARTHUPMAN/job-market-intelligence # Optional if linking via Render UI
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: job-market-db
          property: connectionString
