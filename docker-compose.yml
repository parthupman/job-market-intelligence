version: '3.8'

services:
  postgres:
    image: postgres:15
    environment:
      POSTGRES_USER: jobmarket
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: job_market
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/setup_database.sql:/docker-entrypoint-initdb.d/init.sql

  airflow-webserver:
    image: apache/airflow:2.7.0
    depends_on:
      - postgres
    environment:
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://jobmarket:${DB_PASSWORD}@postgres/job_market
    ports:
      - "8080:8080"
    volumes:
      - ./airflow/dags:/opt/airflow/dags
      - ./extract:/opt/airflow/extract
      - ./dbt_project:/opt/dbt_project

  metabase:
    image: metabase/metabase:latest
    ports:
      - "3000:3000"
    environment:
      MB_DB_TYPE: postgres
      MB_DB_DBNAME: metabase
      MB_DB_PORT: 5432
      MB_DB_USER: jobmarket
      MB_DB_PASS: ${DB_PASSWORD}
      MB_DB_HOST: postgres
    depends_on:
      - postgres

volumes:
  postgres_data:
