version: 2

models:
  - name: stg_adzuna_jobs
    description: "Staged and cleaned Adzuna job postings"
    columns:
      - name: job_key
        description: "Surrogate key for job"
        tests:
          - unique
          - not_null
      - name: job_title
        tests:
          - not_null
      - name: salary_min_annual
        tests:
          - dbt_utils.accepted_range:
              min_value: 0
              max_value: 1000000
      - name: posted_date
        tests:
          - not_null
          - dbt_utils.expression_is_true:
              expression: "<= CURRENT_DATE"

sources:
  - name: raw
    schema: raw
    tables:
      - name: raw_job_postings
        freshness:
          warn_after: {count: 24, period: hour}
          error_after: {count: 48, period: hour}
